; models.ini — local weight directory mapping
;
; The codebase reads this file from the project root as `config.ini`
; (compatibility with the original notebook layout). Copy this template:
;
;     cp configs/models.ini.example config.ini
;
; ...then edit each entry to point at your local cache or HuggingFace cache.
; If `config.ini` is missing, the script falls back to using the model name
; as a raw HuggingFace ID, which still works but redownloads weights.

[qwen-2.5-1.5b-instruct]
weights_directory = Qwen/Qwen2.5-1.5B-Instruct

[qwen-2.5-7b-instruct]
weights_directory = Qwen/Qwen2.5-7B-Instruct

[qwen-2.5-14b-instruct]
weights_directory = Qwen/Qwen2.5-14B-Instruct

[gemma-2-2b-it]
weights_directory = google/gemma-2-2b-it

[gemma-2-9b-it]
weights_directory = google/gemma-2-9b-it

[llama-3.1-8b-instruct]
weights_directory = meta-llama/Llama-3.1-8B-Instruct
